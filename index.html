<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WX">
    <title>WX</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, Arial, sans-serif;
            background: #111;
            color: #eee;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
        }

        .app {
            display: flex;
            height: 100vh;
            height: 100dvh;
        }

        /* ── Sidebar ───────────────────────────────────────────── */
        .sidebar {
            width: 126px;
            background: #181818;
            border-right: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 14px 8px 10px;
            gap: 7px;
            flex-shrink: 0;
        }

        .sidebar-label {
            font-size: 0.62rem;
            letter-spacing: 1.8px;
            text-transform: uppercase;
            color: #3d3d3d;
            margin-bottom: 2px;
        }

        .nav-btn {
            width: 100%;
            padding: 11px 4px;
            background: #202020;
            color: #aaa;
            border: 1px solid #303030;
            border-radius: 7px;
            cursor: pointer;
            font-size: 0.86rem;
            font-weight: 500;
            transition: background 0.12s, color 0.12s;
            touch-action: manipulation; /* tap ok; block pinch-zoom on buttons */
        }

        .nav-btn:hover  { background: #272727; color: #ddd; }
        .nav-btn.active { background: #12374f; border-color: #1f6896; color: #eee; }

        /* ── Sidebar bottom cluster (reload + coords) ─────────── */
        .sidebar-bottom {
            margin-top: auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            padding-top: 8px;
        }

        .reload-btn {
            width: 90%;
            padding: 8px 4px;
            background: none;
            color: #484848;
            border: 1px solid #272727;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            touch-action: manipulation;
            transition: color 0.12s, border-color 0.12s;
        }
        .reload-btn:hover { color: #999; border-color: #3a3a3a; }

        .reload-time {
            font-size: 0.58rem;
            color: #333;
            text-align: center;
            min-height: 1em;
        }

        .loc-pill {
            font-size: 0.58rem;
            color: #2e2e2e;
            text-align: center;
            white-space: pre-line;
            line-height: 1.5;
        }

        /* ── Content area ──────────────────────────────────────── */
        .content {
            flex: 1;
            position: relative;
            overflow: hidden;
            min-width: 0;
        }

        .view {
            display: none;
            position: absolute;
            inset: 0;
            flex-direction: column;
        }
        .view.active { display: flex; }

        /* ── Radar (Leaflet) ───────────────────────────────────── */
        #map-radar { flex: 1; min-height: 0; }

        .map-badge {
            position: absolute;
            top: 10px;
            right: 50px;
            z-index: 800;
            background: rgba(0,0,0,0.68);
            border: 1px solid #2c2c2c;
            border-radius: 5px;
            padding: 3px 9px;
            font-size: 0.68rem;
            color: #888;
            pointer-events: none;
        }

        .timeline-bar {
            position: absolute;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 800;
            background: rgba(10,10,10,0.88);
            backdrop-filter: blur(6px);
            border: 1px solid #2a2a2a;
            border-radius: 22px;
            padding: 5px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .tl-btn {
            background: none;
            border: 1px solid #353535;
            color: #bbb;
            border-radius: 4px;
            padding: 3px 9px;
            cursor: pointer;
            font-size: 0.8rem;
            touch-action: manipulation;
        }
        .tl-btn:hover { background: #1c1c1c; color: #eee; }

        .tl-label { font-size: 0.78rem; color: #888; min-width: 110px; text-align: center; }
        .tl-src   { font-size: 0.62rem; color: #333; }

        /* ── HRRR (Leaflet) ────────────────────────────────────── */
        #map-hrrr { flex: 1; min-height: 0; }

        /* ── AFD ───────────────────────────────────────────────── */
        #view-afd {
            background: #0d0d0d;
            overflow-y: auto;
        }

        .afd-header {
            padding: 11px 16px;
            background: #141414;
            border-bottom: 1px solid #202020;
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: baseline;
            gap: 10px;
            flex-wrap: wrap;
        }

        .afd-header h2 { font-size: 0.9rem; font-weight: 600; }
        .afd-issued    { font-size: 0.7rem; color: #555; }


        .afd-body {
            padding: 14px 16px 24px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.77rem;
            line-height: 1.72;
            white-space: pre-wrap;
            color: #bbb;
        }

        .afd-state {
            padding: 48px 20px;
            text-align: center;
            color: #3a3a3a;
            font-size: 0.88rem;
        }

        /* ── Mobile portrait ───────────────────────────────────── */
        @media (max-width: 768px) and (orientation: portrait) {
            .app { flex-direction: column; }
            .content { order: 1; flex: 1; min-height: 0; }
            .sidebar {
                order: 2;
                width: 100%;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                padding: 8px 10px env(safe-area-inset-bottom, 6px);
                border-right: none;
                border-top: 1px solid #2a2a2a;
                gap: 8px 8px;
                flex-shrink: 0;
                height: auto;
            }
            .sidebar-label { display: none; }
            /* Second row: reload button + timestamp centred across full width */
            .sidebar-bottom {
                margin-top: 0;
                width: 100%;
                flex-direction: row;
                justify-content: center;
                align-items: center;
                padding: 2px 0 0;
                gap: 10px;
            }
            .reload-btn { width: auto; padding: 6px 16px; font-size: 0.8rem; }
            .reload-time { display: block; font-size: 0.72rem; color: #555; min-height: unset; }
            .loc-pill { display: none; }
            .nav-btn {
                width: auto;
                flex: 1;
                max-width: 120px;
                padding: 11px 6px;
                font-size: 0.84rem;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <nav class="sidebar">
        <div class="sidebar-label">Weather</div>
        <button class="nav-btn active" onclick="showView('radar', this)">Radar</button>
        <button class="nav-btn"        onclick="showView('hrrr',  this)">Forecast</button>
        <button class="nav-btn"        onclick="showView('afd',   this)">AFD</button>
        <div class="sidebar-bottom">
            <button class="reload-btn" onclick="reloadAll()">↻ Reload</button>
            <div class="reload-time" id="reload-time"></div>
            <div class="loc-pill" id="loc-pill">Locating…</div>
        </div>
    </nav>

    <main class="content">

        <!-- ── Radar ─────────────────────────────────────────── -->
        <div id="view-radar" class="view active">
            <div id="map-radar"></div>
            <div class="map-badge">NWS NEXRAD</div>
            <div class="timeline-bar">
                <button class="tl-btn" onclick="stepRadar(-1)">◀</button>
                <span class="tl-label" id="radar-lbl">Loading…</span>
                <button class="tl-btn" onclick="stepRadar(1)">▶</button>
                <button class="tl-btn" id="radar-play" onclick="toggleRadarPlay()">▶ Play</button>
                <span class="tl-src">NWS</span>
            </div>
        </div>

        <!-- ── HRRR (Leaflet + IEM WMS) ─────────────────────────── -->
        <div id="view-hrrr" class="view">
            <div id="map-hrrr"></div>
            <div class="map-badge">HRRR Simulated Reflectivity</div>
            <div class="timeline-bar">
                <button class="tl-btn" onclick="stepHrrr(-1)">◀</button>
                <span class="tl-label" id="hrrr-lbl">Loading…</span>
                <button class="tl-btn" onclick="stepHrrr(1)">▶</button>
                <button class="tl-btn" id="hrrr-play" onclick="toggleHrrrPlay()">▶ Play</button>
                <span class="tl-src">IEM / HRRR</span>
            </div>
        </div>

        <!-- ── AFD ───────────────────────────────────────────── -->
        <div id="view-afd" class="view">
            <div class="afd-header">
                <h2 id="afd-title">Area Forecast Discussion</h2>
                <span class="afd-issued" id="afd-issued"></span>
            </div>
            <div id="afd-body" class="afd-state">Awaiting location…</div>
        </div>

    </main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── Globals ─────────────────────────────────────────────────────────────────
let userLat = null, userLon = null;
let radarMap = null, hrrrMap = null;
let radarMarker = null, hrrrMarker = null;

// Radar animation state
const RADAR_FRAMES      = 12;             // 12 × 5 min = 1 hr loop
const RADAR_INTERVAL_MS = 5 * 60 * 1000;
const RADAR_OPACITY     = 0.75;
const ANIM_INTERVAL_MS  = 650;            // ms between frames during playback
const FADE_MS           = 350;            // crossfade duration
let radarLayers = [];                     // [{iso, layer}]
let radarIdx = 0;
let radarTimer = null;

// NWS opengeo WMS — CONUS composite base reflectivity
const NWS_WMS = 'https://opengeo.ncep.noaa.gov/geoserver/conus/conus_bref_qcd/ows?';

// IEM HRRR WMS — simulated composite reflectivity forecast
// Layers named by forecast minute: refd_0000 (analysis), refd_0060 (F+1h), …, refd_1080 (F+18h)
const HRRR_WMS      = 'https://mesonet.agron.iastate.edu/cgi-bin/wms/hrrr/refd.cgi?';
const HRRR_MAX_HOUR = 18;
const HRRR_OPACITY  = 0.75;
const HRRR_FADE_MS  = 350;
const HRRR_ANIM_MS  = 750;
let hrrrLayers = [];   // [{hour, layer}]
let hrrrIdx    = 0;
let hrrrTimer  = null;

// AFD state
let afdLoaded = false;

// ── View switching ───────────────────────────────────────────────────────────
function showView(name, btn) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    btn.classList.add('active');
    if (name === 'radar' && radarMap) setTimeout(() => radarMap.invalidateSize(), 80);
    if (name === 'hrrr') {
        if (!hrrrMap) setTimeout(initHrrrMap, 80);           // lazy first-load
        else          setTimeout(() => hrrrMap.invalidateSize(), 80);
    }
    if (name === 'afd') loadAFD();
}

// ── Bullseye icon (for Leaflet map) ─────────────────────────────────────────
function makeBullseye() {
    return L.divIcon({
        className: '',
        iconSize:   [42, 42],
        iconAnchor: [21, 21],
        html: `<svg xmlns="http://www.w3.org/2000/svg" width="42" height="42" viewBox="0 0 42 42">
          <circle cx="21" cy="21" r="19" fill="none" stroke="#e74c3c" stroke-width="2.5"/>
          <circle cx="21" cy="21" r="9.5" fill="none" stroke="#e74c3c" stroke-width="2.5"/>
          <circle cx="21" cy="21" r="3"   fill="#e74c3c"/>
          <line x1="21" y1="0"  x2="21" y2="9"  stroke="#e74c3c" stroke-width="2.5"/>
          <line x1="21" y1="33" x2="21" y2="42" stroke="#e74c3c" stroke-width="2.5"/>
          <line x1="0"  y1="21" x2="9"  y2="21" stroke="#e74c3c" stroke-width="2.5"/>
          <line x1="33" y1="21" x2="42" y2="21" stroke="#e74c3c" stroke-width="2.5"/>
        </svg>`
    });
}

// ── Build time-stamped WMS layers for animation ──────────────────────────────
// All frames are added to the map at opacity 0 immediately so their tiles
// download into the browser cache. Frame switching then only changes opacity,
// eliminating the remove/re-add flash.  A CSS transition on each layer's
// container element provides the crossfade.
function buildRadarLayers() {
    radarLayers = [];
    const now = Date.now();

    for (let i = RADAR_FRAMES - 1; i >= 0; i--) {
        const raw     = now - i * RADAR_INTERVAL_MS;
        const snapped = Math.floor(raw / RADAR_INTERVAL_MS) * RADAR_INTERVAL_MS;
        const iso     = new Date(snapped).toISOString();

        const layer = L.tileLayer.wms(NWS_WMS, {
            layers:      'conus_bref_qcd',
            format:      'image/png',
            transparent: true,
            opacity:     0,       // invisible until selected; tiles still preload
            version:     '1.3.0',
            zIndex:      5,
            TIME:        iso
        });

        // Wire up the CSS transition as soon as Leaflet creates the container
        layer.on('add', function () {
            const el = this.getContainer();
            if (el) el.style.transition = `opacity ${FADE_MS}ms ease-in-out`;
        });

        layer.addTo(radarMap);    // triggers tile fetch
        radarLayers.push({ iso, layer });
    }

    radarIdx = radarLayers.length - 1;
    showRadarFrame(radarIdx);
}

// ── Display a radar frame ────────────────────────────────────────────────────
function showRadarFrame(i) {
    if (!radarLayers.length || !radarMap) return;
    // Opacity-only swap — no remove/add so tiles never flash
    radarLayers.forEach((e, idx) => e.layer.setOpacity(idx === i ? RADAR_OPACITY : 0));

    const d = new Date(radarLayers[i].iso);
    document.getElementById('radar-lbl').textContent =
        d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) +
        (i === radarLayers.length - 1 ? ' ★' : '');
}

// ── Radar step & play ────────────────────────────────────────────────────────
function stepRadar(dir) {
    radarIdx = Math.max(0, Math.min(radarLayers.length - 1, radarIdx + dir));
    showRadarFrame(radarIdx);
}

function toggleRadarPlay() {
    if (radarTimer) {
        clearInterval(radarTimer);
        radarTimer = null;
        document.getElementById('radar-play').textContent = '▶ Play';
        // Snap back to the most current frame when playback stops
        radarIdx = radarLayers.length - 1;
        showRadarFrame(radarIdx);
    } else {
        radarTimer = setInterval(() => {
            radarIdx = (radarIdx + 1) % radarLayers.length;
            showRadarFrame(radarIdx);
        }, ANIM_INTERVAL_MS);
        document.getElementById('radar-play').textContent = '⏸ Pause';
    }
}

// ── HRRR time helpers ────────────────────────────────────────────────────────
// HRRR runs hourly. Data is available ~45 min after the nominal run time,
// so subtract 45 min from now and floor to the previous hour to get the
// most recent likely-available run.
function hrrrRunTime() {
    const adjusted = Date.now() - 45 * 60 * 1000;
    return new Date(Math.floor(adjusted / 3_600_000) * 3_600_000);
}

// Format a Date as a compact local time, prefixing with "Tmrw" or a short
// weekday name when the valid time crosses into a different calendar day.
function fmtHrrrTime(date) {
    const now      = new Date();
    const timeStr  = date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    const dateStr  = date.toDateString();
    if (dateStr === now.toDateString())
        return timeStr;
    if (dateStr === new Date(now.getTime() + 86_400_000).toDateString())
        return 'Tmrw ' + timeStr;
    return date.toLocaleDateString([], { weekday: 'short' }) + ' ' + timeStr;
}

// ── HRRR Leaflet map ─────────────────────────────────────────────────────────
function buildHrrrLayers() {
    hrrrLayers = [];
    const runTime = hrrrRunTime();

    for (let h = 0; h <= HRRR_MAX_HOUR; h++) {
        const minutes    = h * 60;
        const layerName  = 'refd_' + String(minutes).padStart(4, '0');
        const validTime  = new Date(runTime.getTime() + h * 3_600_000);

        const layer = L.tileLayer.wms(HRRR_WMS, {
            layers:      layerName,
            format:      'image/png',
            transparent: true,
            opacity:     0,
            version:     '1.3.0',
            zIndex:      5
        });

        layer.on('add', function () {
            const el = this.getContainer();
            if (el) el.style.transition = `opacity ${HRRR_FADE_MS}ms ease-in-out`;
        });

        layer.addTo(hrrrMap);
        hrrrLayers.push({ hour: h, validTime, layer });
    }

    hrrrIdx = 0;
    showHrrrFrame(0);
}

function showHrrrFrame(i) {
    if (!hrrrLayers.length || !hrrrMap) return;
    hrrrLayers.forEach((e, idx) => e.layer.setOpacity(idx === i ? HRRR_OPACITY : 0));
    const { hour, validTime } = hrrrLayers[i];
    document.getElementById('hrrr-lbl').textContent =
        fmtHrrrTime(validTime) + (hour === 0 ? ' ★' : '');
}

function stepHrrr(dir) {
    hrrrIdx = Math.max(0, Math.min(hrrrLayers.length - 1, hrrrIdx + dir));
    showHrrrFrame(hrrrIdx);
}

function toggleHrrrPlay() {
    if (hrrrTimer) {
        clearInterval(hrrrTimer);
        hrrrTimer = null;
        document.getElementById('hrrr-play').textContent = '▶ Play';
        hrrrIdx = 0;                // snap back to analysis on stop
        showHrrrFrame(hrrrIdx);
    } else {
        hrrrTimer = setInterval(() => {
            hrrrIdx = (hrrrIdx + 1) % hrrrLayers.length;
            showHrrrFrame(hrrrIdx);
        }, HRRR_ANIM_MS);
        document.getElementById('hrrr-play').textContent = '⏸ Pause';
    }
}

function initHrrrMap() {
    hrrrMap = L.map('map-hrrr', { touchZoom: true, tap: false }).setView([userLat, userLon], 7);

    L.tileLayer(
        'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
        { attribution: '©OpenStreetMap contributors, ©CARTO', subdomains: 'abcd', maxZoom: 19 }
    ).addTo(hrrrMap);

    hrrrMarker = L.marker([userLat, userLon], { icon: makeBullseye(), zIndexOffset: 9999 }).addTo(hrrrMap);

    buildHrrrLayers();
}

// ── Init Leaflet radar map ───────────────────────────────────────────────────
function initRadarMap() {
    radarMap = L.map('map-radar', { touchZoom: true, tap: false }).setView([userLat, userLon], 7);

    L.tileLayer(
        'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
        { attribution: '©OpenStreetMap contributors, ©CARTO', subdomains: 'abcd', maxZoom: 19 }
    ).addTo(radarMap);

    radarMarker = L.marker([userLat, userLon], { icon: makeBullseye(), zIndexOffset: 9999 }).addTo(radarMap);

    buildRadarLayers();
}

// ── AFD ──────────────────────────────────────────────────────────────────────
async function loadAFD(force = false) {
    if (afdLoaded && !force) return;
    if (userLat === null) return;

    afdLoaded = false;
    const body = document.getElementById('afd-body');
    body.className = 'afd-state';
    body.textContent = 'Loading…';
    document.getElementById('afd-issued').textContent = '';

    try {
        const hdrs = { 'User-Agent': 'PersonalWeatherDashboard/1.0 (personal use)' };

        const ptRes = await fetch(
            `https://api.weather.gov/points/${userLat.toFixed(4)},${userLon.toFixed(4)}`,
            { headers: hdrs }
        );
        if (!ptRes.ok) throw new Error('Location not covered by NWS (outside US?)');
        const pt  = await ptRes.json();
        const cwa = pt.properties?.cwa;
        if (!cwa) throw new Error('Could not determine forecast office');

        document.getElementById('afd-title').textContent =
            `Area Forecast Discussion — ${cwa}`;

        const prodRes  = await fetch(
            `https://api.weather.gov/products?type=AFD&location=${cwa}&limit=1`,
            { headers: hdrs }
        );
        const prodData = await prodRes.json();
        const item     = prodData['@graph']?.[0];
        if (!item) throw new Error('No AFD products found for ' + cwa);

        const afd = await (await fetch(item['@id'], { headers: hdrs })).json();

        document.getElementById('afd-issued').textContent =
            'Issued ' + new Date(afd.issuanceTime).toLocaleString();
        body.className = 'afd-body';
        body.textContent = afd.productText;
        afdLoaded = true;
    } catch (e) {
        body.className = 'afd-state';
        body.textContent = `Error: ${e.message}`;
    }
}

// ── Location helpers ─────────────────────────────────────────────────────────
// Try the Geolocation API; on failure fall back to a localStorage-cached fix
// (saved from any previous successful session), then to the CONUS centre.
// The cache means the PWA survives the separate-permission-context iOS quirk
// after the user has granted location at least once.
function geolocate(callback) {
    if (!navigator.geolocation) { callback(39.5, -98.35, true); return; }

    navigator.geolocation.getCurrentPosition(
        pos => {
            const la = pos.coords.latitude, lo = pos.coords.longitude;
            try { localStorage.setItem('wx_lat', la); localStorage.setItem('wx_lon', lo); } catch (_) {}
            callback(la, lo, false);
        },
        () => {
            try {
                const la = parseFloat(localStorage.getItem('wx_lat'));
                const lo = parseFloat(localStorage.getItem('wx_lon'));
                if (!isNaN(la) && !isNaN(lo)) { callback(la, lo, false); return; }
            } catch (_) {}
            callback(39.5, -98.35, true);
        },
        { timeout: 10000, enableHighAccuracy: false }
    );
}

function applyLocation(la, lo, approximate) {
    userLat = la; userLon = lo;
    document.getElementById('loc-pill').textContent = approximate
        ? 'Location\nunavailable'
        : (la >= 0 ? la.toFixed(3) + '°N' : Math.abs(la).toFixed(3) + '°S') + '\n' +
          (lo >= 0 ? lo.toFixed(3) + '°E' : Math.abs(lo).toFixed(3) + '°W');
}

// ── Reload all data ──────────────────────────────────────────────────────────
function updateReloadTime() {
    document.getElementById('reload-time').textContent =
        'Updated ' + new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
}

function reloadAll() {
    updateReloadTime();

    // Stop any running animations
    if (radarTimer) { clearInterval(radarTimer); radarTimer = null; document.getElementById('radar-play').textContent = '▶ Play'; }
    if (hrrrTimer)  { clearInterval(hrrrTimer);  hrrrTimer  = null; document.getElementById('hrrr-play').textContent  = '▶ Play'; }

    // Re-request location, then rebuild everything so the maps re-centre
    // if a better fix is now available (e.g. after granting permission in Settings).
    geolocate((la, lo, approximate) => {
        const moved = la !== userLat || lo !== userLon;
        applyLocation(la, lo, approximate);

        if (moved) {
            if (radarMap && radarMarker) { radarMap.setView([la, lo], radarMap.getZoom()); radarMarker.setLatLng([la, lo]); }
            if (hrrrMap  && hrrrMarker)  { hrrrMap.setView([la, lo],  hrrrMap.getZoom());  hrrrMarker.setLatLng([la, lo]);  }
        }

        if (radarMap) { radarLayers.forEach(e => radarMap.removeLayer(e.layer)); radarLayers = []; buildRadarLayers(); }
        if (hrrrMap)  { hrrrLayers.forEach(e => hrrrMap.removeLayer(e.layer));   hrrrLayers  = []; buildHrrrLayers();  }
        else          { hrrrLayers = []; }

        afdLoaded = false;
        if (document.getElementById('view-afd').classList.contains('active')) loadAFD();
    });
}

// ── Boot ─────────────────────────────────────────────────────────────────────
function start(la, lo, approximate) {
    applyLocation(la, lo, approximate);
    initRadarMap();
    updateReloadTime();
}

geolocate(start);
</script>
